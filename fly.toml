# fly.toml — lightcirle deployment on Fly.io
app = "lightcirle"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

[[mounts]]
  source = "storage"
  destination = "/app/volume"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
