# fly.toml — lightcirle deployment on Fly.io
app = "lightcirle"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/app/data"

[[mounts]]
  source = "uploads"
  destination = "/app/uploads"
