<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lightcirle — 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/tailwind.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-[#FAFAF8] min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-serif font-bold text-[#2D5A3D]">lightcirle</h1>
      <p class="text-gray-500 mt-1 text-sm">管理后台</p>
    </div>
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <h2 class="text-xl font-semibold mb-6">登录</h2>
      <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4"></div>
      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
          <input type="text" id="username" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D5A3D]/30 focus:border-[#2D5A3D] outline-none transition-all" placeholder="admin" value="admin">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" id="password" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D5A3D]/30 focus:border-[#2D5A3D] outline-none transition-all" placeholder="••••••" value="admin123">
        </div>
        <button type="submit" class="w-full bg-[#2D5A3D] text-white py-3 rounded-xl font-semibold hover:bg-[#3E7B54] transition-colors text-base">
          <i class="fas fa-sign-in-alt mr-2"></i> 登录
        </button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      errEl.classList.add('hidden');
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.detail || '登录失败'; errEl.classList.remove('hidden'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/admin/dashboard.html';
      } catch(e) {
        errEl.textContent = '连接失败: ' + e.message;
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
